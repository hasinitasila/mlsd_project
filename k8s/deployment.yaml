apiVersion: apps/v1
kind: Deployment
metadata:
  name: iris-mlp-app
  labels:
    app: iris-mlp-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: iris-mlp-app
  template:
    metadata:
      labels:
        app: iris-mlp-app
    spec:
      containers:
        - name: iris-mlp-app
          # GitHub Actions replaces IMAGE_TAG with the commit SHA
          image: ghcr.io/YOUR_GITHUB_USERNAME/iris-mlp-app:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - containerPort: 8501
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 15
            periodSeconds: 10
